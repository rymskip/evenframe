[workspace]
authors = ["rymskip <17lochinskij@protonmail.com>"]
channels = ["conda-forge", "https://prefix.dev/brads-forge"]
name = "evenframe"
platforms = ["osx-64"]
version = "0.1.0"

[tasks]
# One-shot per-machine bootstrap. Installs global rustup from brads-forge if
# missing, drops cargo/rustc/etc. symlinks into ~/.cargo/bin so the rustup
# multicall dispatch works (pixi expose wrappers don't preserve argv[0]), and
# appends RUSTUP_HOME to ~/.zshenv. Safe to re-run.
"setup-rust" = "bash scripts/setup-rust.sh"

verify = "cargo run -p tooling -- verify"
verify-fast = "cargo run -p tooling -- verify --fail-fast"
test = "cargo run -p tooling -- test"
test-snapshot = "cargo run -p tooling -- test --snapshot"
test-e2e = "cargo run -p tooling -- test --e2e"
test-derive = "cargo run -p tooling -- test --derive"
snapshot-accept = "cargo run -p tooling -- snapshot accept"
snapshot-review = "cargo run -p tooling -- snapshot review"
snapshot-update = "cargo run -p tooling -- snapshot update"

[dependencies]
# Rust toolchain manager from brads-forge. The active rust version, components,
# and targets are pinned in rust-toolchain.toml at the repo root — rustup
# auto-installs that toolchain on first cargo invocation. RUSTUP_HOME is
# shared with the global rustup install via [activation.env] below.
rustup = "*"

[activation.env]
RUSTUP_HOME = "$HOME/.pixi/envs/rustup/.rustup"
